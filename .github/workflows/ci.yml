name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.22"
          enable-cache: true
      - run: uv python install 3.13
      - run: make install
      - run: make db-up
      - name: Run complete checks including the M0 security gate
        id: complete-checks
        env:
          OPENAPI_BASELINE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: make check
      - name: Retain M0 security gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m0-security-gate-${{ github.sha }}
          path: |
            .context-engine/security-gate/raw-evidence.json
            .context-engine/security-gate/release-gate-report.json
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30
      - if: always()
        run: make db-down
